# Rucio client configuration for EIC
# Read-only unprivileged account — same as official eic/containers image.
# Source: https://github.com/eic/containers/blob/master/containers/eic/Dockerfile

[client]
rucio_host = https://rucio-server.jlab.org:443
auth_host = https://rucio-server.jlab.org:443
auth_type = userpass
username = eicread
password = eicread

[policy]
package = eic_rucio_policy_package
extract_scope = eic
lfn2pfn_algorithm_default = eic
